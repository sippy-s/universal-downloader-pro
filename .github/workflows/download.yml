name: Universal Downloader Pro (UDP)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک(ها) - برای چند لینک با فاصله جدا کنید'
        required: true
        default: 'https://example.com/file.zip'
      quality:
        description: 'کیفیت ویدیو (فقط برای یوتیوب: best, 720, 480, worst)'
        required: false
        default: 'best'
      password:
        description: 'رمز فایل ZIP (اختیاری)'
        required: false
        default: ''

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: 1️⃣ چک کردن کدهای ریپازیتوری
        uses: actions/checkout@v4

      - name: 2️⃣ نصب ابزارهای مورد نیاز
        run: |
          sudo apt update
          sudo apt install -y aria2 zip unzip
          pip install yt-dlp

      - name: 3️⃣ دانلود فایل‌ها (تشخیص خودکار لینک یوتیوب)
        run: |
          mkdir -p downloads
          IFS=' ' read -ra URL_ARRAY <<< "${{ github.event.inputs.urls }}"
          for url in "${URL_ARRAY[@]}"; do
            echo "در حال پردازش: $url"
            if [[ $url == *"youtube.com"* || $url == *"youtu.be"* ]]; then
              echo "لینک یوتیوب تشخیص داده شد"
              yt-dlp -f "${{ github.event.inputs.quality }}" \
                     --output "downloads/%(title)s.%(ext)s" \
                     "$url"
            else
              echo "لینک معمولی"
              aria2c -x 16 -s 16 -d downloads --out="downloaded_$(date +%s).tmp" "$url"
            fi
          done

      - name: 4️⃣ تبدیل هر فایل به ZIP چند قسمتی (90 مگابایت)
        run: |
          mkdir -p final_zips
          for file in downloads/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              # حذف پسوند .tmp در صورت وجود
              clean_name="${filename%.tmp}"
              echo "Zipping $filename به قطعات 90MB"
              zip -s 90m -P "${{ github.event.inputs.password }}" "final_zips/${clean_name}.zip" "$file"
            fi
          done
          rm -rf downloads

      - name: 5️⃣ آپلود قطعات به ریپازیتوری
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add final_zips/
          git commit -m "افزودن فایل دانلود شده (قطعات 90MB)" || echo "هیچ تغییری"
          git push
